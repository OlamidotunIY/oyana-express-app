name: Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      EXPO_ANDROID_PACKAGE: ${{ vars.EXPO_ANDROID_PACKAGE != '' && vars.EXPO_ANDROID_PACKAGE || secrets.EXPO_ANDROID_PACKAGE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint app
        run: npm run lint

      - name: Validate Android package configuration
        run: |
          if [ -z "$EXPO_ANDROID_PACKAGE" ]; then
            echo "EXPO_ANDROID_PACKAGE is not set. Add it as either a GitHub Actions repository variable or secret and make it match the Firebase Android app package name."
            exit 1
          fi

      - name: Generate Android project
        env:
          CI: "1"
        run: npx expo prebuild --platform android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Build Android debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: oyana-express-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
