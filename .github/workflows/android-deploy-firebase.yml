name: Android Deploy To Firebase

on:
  workflow_run:
    workflows:
      - Android Build
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy-android:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    steps:
      - name: Download Android artifact from build workflow
        if: github.event_name == 'workflow_run'
        uses: dawidd6/action-download-artifact@v6
        with:
          run_id: ${{ github.event.workflow_run.id }}
          name: oyana-express-android-debug
          path: firebase-artifact

      - name: Download latest Android artifact on manual run
        if: github.event_name == 'workflow_dispatch'
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: android-build.yml
          branch: main
          name: oyana-express-android-debug
          path: firebase-artifact

      - name: Deploy APK to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          file: firebase-artifact/app-debug.apk
          groups: ${{ secrets.FIREBASE_APP_DISTRIBUTION_GROUPS }}
          releaseNotes: |
            Android build from ${{ github.repository }}
            Commit: ${{ github.sha }}
